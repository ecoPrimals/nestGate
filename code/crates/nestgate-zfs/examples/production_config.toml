# NestGate ZFS Pool Setup Configuration
# This configuration eliminates hardcoded values and provides comprehensive customization

[pool_properties]
# Default ashift value (sector size power of 2)
# 12 = 4KB sectors (most modern drives), 9 = 512B sectors (legacy)
default_ashift = 12

# Enable autoexpand by default (pool grows when underlying devices are expanded)
autoexpand = true

# Enable autotrim by default (automatic TRIM/discard support for SSDs)
autotrim = true

# Default compression algorithm
# Options: "off", "lz4", "gzip", "gzip-1" through "gzip-9", "zle", "lzjb"
default_compression = "lz4"

# Default recordsize in KB
# Smaller for databases (8-16KB), larger for sequential workloads (128KB-1MB)
default_recordsize_kb = 128

# Enable deduplication by default (use cautiously - high memory overhead)
enable_dedup = false

[device_detection]
# Minimum device size in bytes (1GB)
min_device_size = 1073741824

# Maximum device size in bytes (0 = no limit)
max_device_size = 0

# Skip devices with these mount points
skip_mountpoints = ["/", "/boot", "/boot/efi", "/home", "/var", "/tmp"]

# Skip devices with these filesystem types
skip_fstypes = ["ext4", "xfs", "btrfs", "ntfs", "vfat", "swap"]

# Device scanning timeout in seconds
scan_timeout_seconds = 30

# Include loop devices in scanning (useful for testing)
include_loop_devices = false

[safety]
# Require confirmation for destructive operations
require_confirmation = true

# Allow overwriting existing pools (dangerous!)
allow_pool_overwrite = false

# Maximum number of devices per pool
max_devices_per_pool = 24

# Minimum free space required (percentage)
min_free_space_percent = 10.0

# Enable dry-run mode by default
default_dry_run = false

# Backup existing data before operations
auto_backup = true

[performance.cache_hit_thresholds]
# ARC cache hit ratio thresholds
excellent = 0.95
good = 0.85
warning = 0.75
critical = 0.60

[performance.io_thresholds]
# IOPS thresholds by tier (operations per second)
iops_thresholds = { hot = 50000, warm = 10000, cold = 1000 }

# Latency thresholds in milliseconds
latency_thresholds = { hot = 1.0, warm = 5.0, cold = 20.0 }

# Throughput thresholds in MB/s
throughput_thresholds = { hot = 1000.0, warm = 500.0, cold = 100.0 }

[performance.memory_limits]
# Maximum ARC size as percentage of system RAM
max_arc_percent = 0.75

# Minimum ARC size in bytes (1GB)
min_arc_bytes = 1073741824

[performance.memory_limits.l2arc_limits]
# L2ARC maximum size in bytes (0 = auto-size based on available L2ARC devices)
max_size_bytes = 0

# L2ARC feed time in seconds
feed_secs = 1

# L2ARC headroom (multiplier for prefetch)
headroom = 2

[performance.optimization_intervals]
# Tier optimization interval in seconds (1 hour)
tier_optimization = 3600

# Performance analysis interval in seconds (5 minutes)
performance_analysis = 300

# Health check interval in seconds (10 minutes)
health_check = 600

# Metrics collection interval in seconds (30 seconds)
metrics_collection = 30

[tier_config.tier_properties.hot]
# Hot tier: Maximum performance, lower compression
compression = "lz4"
recordsize = "128K"
primarycache = "all"
secondarycache = "all"
logbias = "latency"
sync = "standard"
atime = "off"

[tier_config.tier_properties.warm]
# Warm tier: Balanced performance and compression
compression = "gzip-1"
recordsize = "128K"
primarycache = "all"
secondarycache = "all"
logbias = "throughput"
sync = "standard"
atime = "off"

[tier_config.tier_properties.cold]
# Cold tier: Maximum compression, optimized for capacity
compression = "gzip-9"
recordsize = "1M"
primarycache = "metadata"
secondarycache = "metadata"
logbias = "throughput"
sync = "disabled"
atime = "off"

[tier_config.migration_thresholds]
# Access frequency thresholds (accesses per day)
access_frequency = { hot = 100.0, warm = 10.0, cold = 1.0 }

# File age thresholds (days)
file_age = { hot = 7, warm = 30, cold = 90 }

# File size thresholds (bytes) - smaller files prefer faster tiers
file_size = { hot = 1048576, warm = 104857600, cold = 1073741824 }

[tier_config.tier_limits]
# Maximum utilization percentage per tier
max_utilization = { hot = 0.80, warm = 0.85, cold = 0.90 }

# Warning thresholds per tier
warning_thresholds = { hot = 0.70, warm = 0.75, cold = 0.80 }

# Reserved space per tier (bytes) - emergency space
reserved_space = { hot = 10737418240, warm = 21474836480, cold = 53687091200 } 