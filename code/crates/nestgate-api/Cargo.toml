[package]
name = "nestgate-api"
version = "0.1.0"
edition = "2021"
authors = ["NestGate Development Team <dev@nestgate.io>"]
description = "API server and interface definitions for NestGate with enhanced streaming capabilities"
license = "AGPL-3.0-only"
repository = "https://github.com/nestgate/nestgate"
keywords = [ "api", "kubernetes", "network", "gateway", "service-mesh", "streaming", "sse", "rpc",]
categories = [ "network-programming", "api-bindings", "web-programming",]
homepage = "https://nestgate.io"
documentation = "https://docs.rs/nestgate-api"
readme = "README.md"

[dependencies]
hyper = "0.14"
futures-util = "0.3"
num_cpus = "1.16"
fastrand = "2.0"
toml = "0.8"
sha2 = "0.10"
rand = "0.8"
sysinfo = "0.37.0"
url = "2.5.7"
async-stream = "0.3"

[dev-dependencies]
axum-test = "15.0"
tokio-test = "0.4"
mockall = "0.12"
rstest = "0.18"
tempfile = "3.10"

[features]
default = [ "sse", "streaming-rpc",]
sse = []
streaming-rpc = [ "tarpc", "bincode", "tokio-util", "tokio-serde",]
dev-stubs = []  # ⚠️ Development stubs - DO NOT use in production builds

[lints]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.tower]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.reqwest]
version = "0.11"
features = [ "json", "rustls-tls",]
default-features = false

[dependencies.tokio-stream]
version = "0.1"
features = [ "sync",]

[dependencies.uuid]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.nestgate-core]
path = "../nestgate-core"

[dependencies.nestgate-zfs]
path = "../nestgate-zfs"

[dependencies.nestgate-network]
path = "../nestgate-network"

[dependencies.nestgate-automation]
path = "../nestgate-automation"

[dependencies.config]
workspace = true

[dependencies.warp]
workspace = true

[dependencies.tarpc]
version = "0.37"
features = [ "tokio1", "serde1", "serde-transport", "tcp",]
optional = true

[dependencies.bincode]
version = "1.3"
optional = true

[dependencies.tokio-serde]
version = "0.8"
features = [ "bincode",]
optional = true

[dependencies.tokio-util]
version = "0.7"
features = [ "codec",]
optional = true

[dev-dependencies.reqwest]
version = "0.11"
features = [ "json",]

[dev-dependencies.tracing-subscriber]
workspace = true
