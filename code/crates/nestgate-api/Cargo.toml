[package]
name = "nestgate-api"
version = "0.1.0"
edition = "2021"
authors = ["DataScienceBioLab"]
description = "API server and interface definitions for NestGate with enhanced capabilities"
license = "AGPL-3.0-or-later"
repository = "https://github.com/DataScienceBioLab/NestGateV2"
keywords = ["api", "kubernetes", "network", "gateway", "service-mesh"]
categories = ["network-programming", "api-bindings", "web-programming"]

[dependencies]
# Web framework
axum = { workspace = true, features = ["json", "query", "multipart"] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["cors", "trace", "timeout", "limit"] }
tokio = { workspace = true, features = ["full"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time handling
chrono = { workspace = true, features = ["serde"] }

# System utilities
num_cpus = "1.16"

# NestGate dependencies
nestgate-core = { path = "../nestgate-core" }
nestgate-zfs = { path = "../nestgate-zfs" }
nestgate-automation = { path = "../nestgate-automation" }

# Added for operation IDs
uuid = { workspace = true }

[dev-dependencies]
# Testing framework
axum-test = "15.0"
tokio-test = "0.4"
mockall = "0.12"
rstest = "0.18"

# HTTP client for testing
reqwest = { version = "0.11", features = ["json"] }

# Test utilities
tempfile = "3.8"

[lints]
workspace = true 