[package]
name = "nestgate-network"
version = "0.1.0"
edition = "2021"
description = "Network protocols and communication for NestGate"
license = "AGPL-3.0-or-later"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
axum = { version = "0.7", features = ["json", "tokio"] }
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
nestgate-core = { path = "../nestgate-core" }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-tungstenite = "0.24"
tracing = "0.1"
tungstenite = "0.24"
uuid = { version = "1.0", features = ["v4", "serde"] }
warp = "0.3"

# Additional dependencies for async streaming
async-stream = "0.3"

# Web Framework
tower = { workspace = true }
tower-http = { workspace = true }

# Network
ipnetwork = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true } 