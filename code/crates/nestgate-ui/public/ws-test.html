<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NestGate - WebSocket Test</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
    }
    .card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    .status {
      font-weight: bold;
    }
    .connected {
      color: #27ae60;
    }
    .disconnected {
      color: #e74c3c;
    }
    .connecting {
      color: #f39c12;
    }
    .button-group {
      margin: 20px 0;
    }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background-color: #2980b9;
    }
    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }
    #message-log {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 4px;
      background-color: #f9f9f9;
    }
    .message {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 4px;
    }
    .received {
      background-color: #e8f4fd;
      border-left: 4px solid #3498db;
    }
    .sent {
      background-color: #eafaf1;
      border-left: 4px solid #27ae60;
    }
    .error {
      background-color: #fdeded;
      border-left: 4px solid #e74c3c;
    }
    .timestamp {
      color: #7f8c8d;
      font-size: 0.8rem;
    }
    .nav {
      margin-bottom: 20px;
    }
    .nav a {
      color: #3498db;
      text-decoration: none;
    }
    .nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">&larr; Back to Dashboard</a>
  </div>
  
  <h1>WebSocket Test Page</h1>
  
  <div class="card">
    <h2>Connection Status</h2>
    <p>Status: <span id="connection-status" class="status disconnected">Disconnected</span></p>
    <div class="button-group">
      <button id="connect-btn">Connect</button>
      <button id="disconnect-btn" disabled>Disconnect</button>
    </div>
  </div>
  
  <div class="card">
    <h2>Send Test Message</h2>
    <p>Send a test message to the server:</p>
    <div class="button-group">
      <button id="send-ping-btn" disabled>Send Ping</button>
      <button id="request-system-btn" disabled>Request System Status</button>
      <button id="request-pools-btn" disabled>Request Pools</button>
    </div>
  </div>
  
  <div class="card">
    <h2>Message Log</h2>
    <div id="message-log"></div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // DOM Elements
      const connectBtn = document.getElementById('connect-btn');
      const disconnectBtn = document.getElementById('disconnect-btn');
      const sendPingBtn = document.getElementById('send-ping-btn');
      const requestSystemBtn = document.getElementById('request-system-btn');
      const requestPoolsBtn = document.getElementById('request-pools-btn');
      const connectionStatus = document.getElementById('connection-status');
      const messageLog = document.getElementById('message-log');
      
      // WebSocket instance
      let socket = null;
      
      // Log message to the message log
      function logMessage(message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString();
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.innerHTML = `
          <span class="timestamp">[${timestamp}]</span>
          <pre>${typeof message === 'object' ? JSON.stringify(message, null, 2) : message}</pre>
        `;
        messageLog.appendChild(messageDiv);
        messageLog.scrollTop = messageLog.scrollHeight;
      }
      
      // Connect to WebSocket server
      function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        
        connectionStatus.textContent = 'Connecting...';
        connectionStatus.className = 'status connecting';
        
        socket = new WebSocket(wsUrl);
        
        socket.onopen = function() {
          connectionStatus.textContent = 'Connected';
          connectionStatus.className = 'status connected';
          
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          sendPingBtn.disabled = false;
          requestSystemBtn.disabled = false;
          requestPoolsBtn.disabled = false;
          
          logMessage('WebSocket connection established', 'received');
        };
        
        socket.onmessage = function(event) {
          try {
            const data = JSON.parse(event.data);
            logMessage(data, 'received');
          } catch (error) {
            logMessage(`Received: ${event.data}`, 'received');
          }
        };
        
        socket.onclose = function() {
          connectionStatus.textContent = 'Disconnected';
          connectionStatus.className = 'status disconnected';
          
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          sendPingBtn.disabled = true;
          requestSystemBtn.disabled = true;
          requestPoolsBtn.disabled = true;
          
          logMessage('WebSocket connection closed', 'error');
          socket = null;
        };
        
        socket.onerror = function(error) {
          logMessage(`WebSocket error: ${error}`, 'error');
        };
      }
      
      // Disconnect from WebSocket server
      function disconnectWebSocket() {
        if (socket) {
          socket.close();
        }
      }
      
      // Send a ping message
      function sendPing() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          const message = {
            type: 'ping',
            timestamp: Date.now()
          };
          socket.send(JSON.stringify(message));
          logMessage(message, 'sent');
        }
      }
      
      // Request system status
      function requestSystemStatus() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          const message = {
            type: 'request',
            target: 'system'
          };
          socket.send(JSON.stringify(message));
          logMessage(message, 'sent');
        }
      }
      
      // Request pools data
      function requestPools() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          const message = {
            type: 'request',
            target: 'pools'
          };
          socket.send(JSON.stringify(message));
          logMessage(message, 'sent');
        }
      }
      
      // Event Listeners
      connectBtn.addEventListener('click', connectWebSocket);
      disconnectBtn.addEventListener('click', disconnectWebSocket);
      sendPingBtn.addEventListener('click', sendPing);
      requestSystemBtn.addEventListener('click', requestSystemStatus);
      requestPoolsBtn.addEventListener('click', requestPools);
    });
  </script>
</body>
</html>
