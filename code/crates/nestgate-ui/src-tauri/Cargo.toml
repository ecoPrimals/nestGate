[package]
name = "nestgate-ui"
version = "0.1.0"
description = "NestGate TrueNAS ZFS Management Desktop Application"
authors = ["NestGate Team"]
license = "MIT"
repository = "https://github.com/nestgate/nestgate"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "1.0", features = [] }

[dependencies]
tauri = { version = "1.0", features = ["api-all", "shell-open"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"] 