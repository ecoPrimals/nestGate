[package]
name = "nestgate-core"
version = "0.9.2"
edition = "2021"
description = "Core functionality and utilities for NestGate"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }

# Enhanced dependencies for advanced integration capabilities
config = "0.14"
toml = "0.8"
fastrand = "2.0"
num_cpus = "1.16"
gethostname = "0.4"

# Additional dependencies needed by the existing code
axum = { workspace = true }
rand = "0.8"
procfs = "0.16"

# ZFS integration (optional since not all systems have ZFS)
libzfs = { version = "0.6", optional = true }
nix = { version = "0.28", optional = true }

[features]
default = []
zfs = ["libzfs", "nix"]

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = "3.8"
 