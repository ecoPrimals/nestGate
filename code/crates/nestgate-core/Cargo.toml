[package]
name = "nestgate-core"
version = "0.1.0"
edition = "2021"
description = "Core functionality and utilities for NestGate"
license = "AGPL-3.0-or-later"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
axum = { version = "0.7", features = ["json", "tokio"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

# Enhanced dependencies for advanced integration capabilities
config = "0.14"

# Additional dependencies needed by the existing code
futures = "0.3"
futures-util = "0.3"
log = "0.4"

# System dependencies for cross-platform functionality
libc = "0.2"
users = "0.11"  # ✅ SAFE: Replace unsafe libc calls with safe user/group lookups
url = "2.4"

# Zero-copy optimization dependencies
bytes = "1.7"
memmap2 = "0.9"

# Data source integration dependencies
urlencoding = "2.0"
base64 = "0.21"

# Additional dependencies for comprehensive functionality
rand = "0.8"
flate2 = "1.0"
dashmap = "5.5"
parking_lot = "0.12"
num_cpus = "1.16"
md5 = "0.7"
dirs = "5.0"
sha2 = "0.10"
serde_yaml = "0.9"
hex = "0.4"
gethostname = "0.4"
lazy_static = "1.4"
tempfile = "3.8"
regex = "1.10"
fastrand = "2.0"

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = "3.8"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "performance_validation"
harness = false

[features]
default = [] 