[package]
name = "nestgate-core"
version = "0.9.2"
edition = "2021"
description = "Core functionality and utilities for NestGate"
license = "AGPL-3.0-or-later"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
async-trait = "0.1"
reqwest = { version = "0.11", features = ["json"] }
md5 = "0.7"
flate2 = "1.0"
dirs = "5.0"
regex = "1.10"
sys-info = "0.9"
walkdir = "2.4"
notify = "6.1"
sha2 = "0.10"
bincode = "1.3"
toml = "0.8"
fastrand = "2.0"
num_cpus = "1.16"
gethostname = "0.4"

# Enhanced dependencies for advanced integration capabilities
config = "0.14"

# Additional dependencies needed by the existing code
futures = "0.3"
log = "0.4"

# Zero-copy optimization dependencies
bytes = "1.7"
memmap2 = "0.9"

# Data source integration dependencies
urlencoding = "2.0"

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = "3.8"

[features]
default = [] 