[package]
name = "nestgate-middleware"
version = "0.9.2"
edition = "2021"
authors = ["DataScienceBioLab"]
description = "Middleware components for NestGate NAS system"
license = "AGPL-3.0-or-later"
repository = "https://github.com/DataScienceBioLab/nestgate"
keywords = ["middleware", "nas", "storage"]

[dependencies]
# Internal crates
nestgate-core = { path = "../nestgate-core" }

# Async runtime
tokio = { workspace = true }
async-trait = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging and tracing
tracing = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# System utilities
num_cpus = "1.0"

[dev-dependencies]
tokio-test = { workspace = true }
mockall = "0.11" 