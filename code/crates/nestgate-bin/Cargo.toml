[[bin]]
name = "nestgate"
path = "src/main.rs"

[[bin]]
name = "nestgate-client"
path = "src/bin/nestgate-client.rs"

[package]
name = "nestgate-bin"
version = "2.0.0"
edition = "2021"
description = "Main binary for NestGate NAS system - standalone distributed service"
license = "AGPL-3.0-only"
repository = "https://github.com/eastgate/nestgate"
readme = "README.md"
keywords = [ "rust", "nestgate", "core", "async",]
categories = [ "development-tools",]

[dependencies.nestgate-core]
path = "../nestgate-core"

# [dependencies.nestgate-zfs]
# path = "../nestgate-zfs"

[dependencies.nestgate-network]
path = "../nestgate-network"

[dependencies.nestgate-api]
path = "../nestgate-api"

[dependencies.nestgate-mcp]
path = "../nestgate-mcp"

[dependencies.tokio]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.axum]
workspace = true

[dependencies.tower-http]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.chrono]
workspace = true

[dependencies.clap]
version = "4.4"
features = [ "derive",]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.thiserror]
workspace = true

[dev-dependencies.tokio-test]
workspace = true
