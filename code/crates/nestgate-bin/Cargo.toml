[package]
name = "nestgate-bin"
version = "0.9.2"
edition = "2021"
description = "Main binary for NestGate system"

[[bin]]
name = "nestgate"
path = "src/main.rs"

[[bin]]
name = "nestgate-client"
path = "src/bin/nestgate-client.rs"

[dependencies]
nestgate-core = { path = "../nestgate-core" }
nestgate-network = { path = "../nestgate-network" }
nestgate-mcp = { path = "../nestgate-mcp" }

tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }

# CLI and serialization dependencies
clap = { version = "4.4", features = ["derive"] }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Orchestrator dependency
nestgate-orchestrator = { path = "../nestgate-orchestrator" }

[dev-dependencies]
tokio-test = { workspace = true } 