# Clippy configuration for maximum code quality
# Cognitive complexity threshold
cognitive-complexity-threshold = 15

# Type complexity threshold  
type-complexity-threshold = 100

# Too many arguments threshold
too-many-arguments-threshold = 5

# Too many lines threshold
too-many-lines-threshold = 150

# Trivially copy pass by value threshold
trivial-copy-size-limit = 64

# Large types passed by value threshold
pass-by-value-size-limit = 256

# Literal representation threshold
literal-representation-threshold = 10

# Enum variant name threshold
enum-variant-name-threshold = 3

# Maximum struct bools
max-struct-bools = 3

# Maximum function parameter bools
max-fn-params-bools = 3

# Maximum trait bounds
max-trait-bounds = 3

# Maximum suggested slice pattern length
max-suggested-slice-pattern-length = 3

# Stack size threshold
stack-size-threshold = 512000 