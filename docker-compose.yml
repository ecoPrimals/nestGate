# ==============================================================================
# NestGate Production Docker Compose
# Complete production deployment with monitoring and networking
# ==============================================================================

version: '3.8'

services:
  nestgate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: nestgate:latest
    container_name: nestgate-main
    restart: unless-stopped
    
    # Environment configuration
    environment:
      - NESTGATE_ENVIRONMENT=production
      - NESTGATE_LOG_LEVEL=info
      - NESTGATE_API_PORT=8000
      - NESTGATE_WEBSOCKET_PORT=8080
      - NESTGATE_DEFAULT_CACHE_SIZE=2147483648  # 2GB
      - NESTGATE_MAX_FILE_SIZE=107374182400     # 100GB
      - NESTGATE_CONNECTION_TIMEOUT_MS=30000    # 30s
      - NESTGATE_REQUEST_TIMEOUT_MS=60000       # 60s
      - RUST_LOG=nestgate=info
      - RUST_BACKTRACE=1
    
    # Port mappings
    ports:
      - "8000:8000"    # API port
      - "8080:8080"    # WebSocket port
      - "9090:9090"    # Prometheus metrics
    
    # Volume mounts for persistence
    volumes:
      - nestgate_data:/opt/nestgate/data
      - nestgate_logs:/opt/nestgate/logs
      - nestgate_config:/opt/nestgate/config
      - /dev/zfs:/dev/zfs:rw           # ZFS device access
      - /proc/spl:/proc/spl:ro         # ZFS kernel module info
    
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Security and privileges
    privileged: false
    cap_add:
      - SYS_ADMIN      # Required for ZFS operations
    devices:
      - /dev/zfs:/dev/zfs
    
    # Networking
    networks:
      - nestgate_network
    
    # Dependency and startup order
    depends_on:
      - prometheus
      - grafana

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: nestgate-prometheus
    restart: unless-stopped
    
    ports:
      - "9091:9090"
    
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    
    networks:
      - nestgate_network

  # Grafana dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: nestgate-grafana
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nestgate_admin_2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    
    networks:
      - nestgate_network
    
    depends_on:
      - prometheus

  # Log aggregation (optional)
  loki:
    image: grafana/loki:2.9.0
    container_name: nestgate-loki
    restart: unless-stopped
    
    ports:
      - "3100:3100"
    
    volumes:
      - ./docker/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    
    command: -config.file=/etc/loki/local-config.yaml
    
    networks:
      - nestgate_network

# Networking
networks:
  nestgate_network:
    driver: bridge
    name: nestgate_network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Persistent volumes
volumes:
  nestgate_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/nestgate/data
  
  nestgate_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/nestgate/logs
  
  nestgate_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/nestgate/config
  
  prometheus_data:
    driver: local
  
  grafana_data:
    driver: local
  
  loki_data:
    driver: local 