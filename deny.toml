# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for NestGate supply chain auditing

[advisories]
version = 2
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # bincode: unmaintained — transitive via tarpc (our IPC layer); tarpc requires it.
    # TRACKING: Monitor tarpc for migration to postcard or another codec.
    # When tarpc drops bincode, remove this ignore and the bincode workspace dep.
    # See: https://github.com/google/tarpc/issues — search "bincode"
    "RUSTSEC-2025-0141",
    # rsa: Marvin timing sidechannel — no fixed release yet (RUSTSEC-2023-0071). Required by
    # rustls-rustcrypto for TLS RSA cipher suites; TLS use is outbound HTTPS with RustCrypto only.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "AGPL-3.0-or-later",
    "CDLA-Permissive-2.0",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
# Workspace path deps are inherently unversioned; the deny list below is the real supply-chain gate.
wildcards = "allow"
# ecoBin v3: Pure Rust required. C-dependency ban list per wateringHole standard.
deny = [
    { name = "openssl-sys", reason = "ecoBin: C crypto FFI. Use rustls + RustCrypto.", use-instead = "rustls" },
    { name = "openssl", reason = "ecoBin: C crypto. Use rustls or RustCrypto suite.", use-instead = "rustls, sha2, aes-gcm, ed25519-dalek" },
    { name = "native-tls", reason = "ecoBin: platform C TLS. Use rustls.", use-instead = "rustls" },
    { name = "aws-lc-sys", reason = "ecoBin: C crypto FFI. Use RustCrypto.", use-instead = "sha2, aes-gcm" },
    { name = "aws-lc-rs", reason = "ecoBin: C/ASM crypto. Use RustCrypto.", use-instead = "sha2, aes-gcm, ed25519-dalek" },
    { name = "ring", reason = "ecoBin: C/ASM crypto. Crypto delegated to BearDog via IPC.", use-instead = "sha2, blake3, RustCrypto" },
    { name = "libz-sys", reason = "ecoBin: C compression FFI. Use flate2 (rust backend) or miniz_oxide.", use-instead = "flate2 (default-features = false, features = [\"rust_backend\"])" },
    { name = "bzip2-sys", reason = "ecoBin: C compression FFI.", use-instead = "bzip2-rs" },
    { name = "curl-sys", reason = "ecoBin: C HTTP FFI.", use-instead = "reqwest (rustls)" },
    { name = "cmake", reason = "ecoBin: C build system. Pure Rust only.", use-instead = "cc-free alternatives" },
    { name = "pkg-config", reason = "ecoBin: C pkg-config FFI discovery.", use-instead = "Pure Rust crates" },
    { name = "vcpkg", reason = "ecoBin: C/C++ package manager integration.", use-instead = "Pure Rust crates" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
