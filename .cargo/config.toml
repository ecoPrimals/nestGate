# NestGate Cross-Compilation Configuration
# plasmidBin Multi-Architecture Support
# Created: January 31, 2026

[build]
target-dir = "target"

# ============================================================================
# ARM64 Targets (Primary plasmidBin Focus)
# ============================================================================

# ARM64 Linux (musl - static linking, fully portable)
# Used for: USB LiveSpore, standalone Linux deployments
# Linker: aarch64-linux-gnu-gcc (ecosystem standard — same as all other primals)
# link-self-contained=yes: musl CRT objects from Rust sysroot (not system glibc CRT)
# relocation-model=static: prevents static-PIE segfault on musl ≤1.2.2
#   (Ubuntu 22.04 ships musl 1.2.2 — _start_c/dlstart.c crash in PIE mode)
[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-gnu-gcc"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=static",
    "-C", "link-self-contained=yes",
]

# ARM64 Android (via NDK)
# Used for: Android deployments (Pixel, GrapheneOS)
# Requires: ANDROID_NDK_HOME environment variable
[target.aarch64-linux-android]
ar = "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
linker = "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
rustflags = [
    "-C", "link-arg=-lm",
    "-C", "link-arg=-llog",
]

# ARM64 Linux (gnu - for testing and development)
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# ============================================================================
# x86_64 Targets (Current Production)
# ============================================================================

# x86_64 Linux (musl - static linking)
# Current primary deployment target
# link-self-contained=yes: use Rust's bundled rust-lld + musl CRT (no musl-tools needed)
# relocation-model=static prevents static-PIE which segfaults on musl ≤1.2.2
# (Ubuntu 22.04 ships musl 1.2.2 — _start_c/dlstart.c crash in PIE mode)
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=static",
    "-C", "link-self-contained=yes",
]

# x86_64 Linux (gnu - for development)
[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

# ============================================================================
# macOS Targets (Optional, for completeness)
# ============================================================================

# Apple Silicon (ARM64)
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# Intel Mac (x86_64)
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# ============================================================================
# RISC-V Targets (Future - Phase 2)
# ============================================================================

# RISC-V 64-bit (for future hardware)
# Uncomment when ready to test
# [target.riscv64gc-unknown-linux-gnu]
# linker = "riscv64-linux-gnu-gcc"

# ============================================================================
# WebAssembly Targets (Future - Phase 3)
# ============================================================================

# WASM for browser deployment (future)
# Uncomment when ready to test
# [target.wasm32-unknown-unknown]
# rustflags = ["-C", "target-feature=+simd128"]

# ============================================================================
# Performance Optimizations (All Targets)
# ============================================================================
# [profile.release] and [profile.release-small] are in workspace Cargo.toml
# (Cargo requires profiles to be in the manifest, not config.toml)

# ============================================================================
# Cargo Configuration
# ============================================================================

[cargo-new]
vcs = "git"

[alias]
# Convenience aliases for plasmidBin builds
build-all-targets = "build --release --target x86_64-unknown-linux-musl --target aarch64-unknown-linux-musl --target aarch64-linux-android"
build-arm64 = "build --release --target aarch64-unknown-linux-musl"
build-android = "build --release --target aarch64-linux-android"
build-x64 = "build --release --target x86_64-unknown-linux-musl"

# ============================================================================
# Notes
# ============================================================================
# 
# To use this configuration:
# 1. Install target toolchains:
#    rustup target add aarch64-unknown-linux-musl
#    rustup target add aarch64-linux-android
#    rustup target add x86_64-unknown-linux-musl
#
# 2. Install cross-compilation tools:
#    # aarch64-musl: apt install gcc-aarch64-linux-gnu (ecosystem standard)
#    # x86_64-musl:  self-contained, no external tools needed
#    # Android NDK:  export ANDROID_NDK_HOME="$HOME/Android/Sdk/ndk/26.0.10792818"
#    # Validation:   apt install qemu-user-static  (optional, for QEMU runtime test)
#
# 3. Build for specific target:
#    cargo build --release --target aarch64-unknown-linux-musl
#    cargo build --release --target aarch64-linux-android
#
# 4. Use convenience aliases:
#    cargo build-arm64
#    cargo build-android
#    cargo build-all-targets
