# NestGate v2 Workspace Configuration
# Distributed NAS system - library and workspace

[package]
name = "nestgate"
version = "0.9.2"
edition = "2021"
authors = ["NestGate Team"]
license = "AGPL-3.0-or-later"
description = "Intelligent ZFS-based storage automation platform"
repository = "https://github.com/nestgate/nestgate"
keywords = ["zfs", "storage", "automation", "nas", "backup"]
categories = ["filesystem", "command-line-utilities"]

# This is a workspace-only package - no binary or lib

# Workspace configuration for all NestGate crates
[workspace]
members = [
    "code/crates/nestgate-core",
    "code/crates/nestgate-zfs",
    "code/crates/nestgate-api",
    "code/crates/nestgate-network",
    "code/crates/nestgate-automation",
    "code/crates/nestgate-nas",
    "code/crates/nestgate-ui",  # DEPRECATED - will be removed in future release
    "code/crates/nestgate-mcp",
    "code/crates/nestgate-installer",
    "code/crates/nestgate-bin",
    "code/crates/nestgate-fsmonitor",
    "code/crates/nestgate-middleware",
]
exclude = [
    "target",
    "specs",
    "docs",
]
resolver = "2"

[dependencies]
# Core dependencies for NestGate library
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
tokio.workspace = true
tracing.workspace = true
uuid.workspace = true

# Test dependencies for root level tests
axum.workspace = true
axum-test = "15.0"
reqwest.workspace = true

# Main binary depends on all crates
nestgate-core = { path = "code/crates/nestgate-core" }
nestgate-zfs = { path = "code/crates/nestgate-zfs" }
nestgate-api = { path = "code/crates/nestgate-api" }
nestgate-network = { path = "code/crates/nestgate-network" }
nestgate-automation = { path = "code/crates/nestgate-automation" }
nestgate-nas = { path = "code/crates/nestgate-nas" }
nestgate-ui = { path = "code/crates/nestgate-ui" }  # DEPRECATED - headless design
nestgate-mcp = { path = "code/crates/nestgate-mcp" }
nestgate-installer = { path = "code/crates/nestgate-installer" }
nestgate-fsmonitor = { path = "code/crates/nestgate-fsmonitor" }
nestgate-middleware = { path = "code/crates/nestgate-middleware" }
rand = "0.8"
regex = "1.0"
async-trait.workspace = true
chrono = "0.4"

[dev-dependencies]
tokio-test = "0.4"
regex = "1.0"
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3.8"
fastrand = "2.0"
sysinfo = "0.30"
num_cpus = "1.16"
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = []

[[bench]]
name = "performance_benchmarks"
harness = false

[workspace.dependencies]
# Shared dependencies for workspace members
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = { version = "0.7", features = ["ws", "macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
warp = "0.3"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
clap = { version = "4.0", features = ["derive"] }
tokio-test = "0.4"
indexmap = "2.0"
reqwest = { version = "0.11", features = ["json"] }
config = "0.14"
ipnetwork = "0.20"

[workspace.lints.rust]
unused_imports = "warn"
dead_code = "warn"

[workspace.lints.clippy]
all = "warn"
