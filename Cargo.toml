# NestGate v2 Workspace Configuration
# Enhanced orchestrator-centric architecture with advanced capabilities

[workspace]
resolver = "2"

members = [
    "code/crates/nestgate-core",
    "code/crates/nestgate-mcp",
    "code/crates/nestgate-network",
    "code/crates/nestgate-ui",
    "code/crates/nestgate-bin",
    "code/crates/nestgate-orchestrator",
    "code/crates/nestgate-fsmonitor",
    "code/crates/nestgate-zfs",
    "code/crates/nestgate-nas",
    "code/crates/nestgate-ai-mock",
    "code/crates/nestgate-ai-models",
    "code/crates/nestgate-middleware",
    "code/crates/nestgate-api"
]

# Dependency Audit - Enhanced with proven patterns
# This section documents our dependency management strategy and known issues
[workspace.metadata.dependency-audit]
strategy = "allow-multiple-versions"
known_conflicts = [
    { crate = "base64", versions = ["0.21.7", "0.22.1"], reason = "kube ecosystem dependency" },
    { crate = "hashbrown", versions = ["0.14.5", "0.15.2"], reason = "kube ecosystem dependency" },
    { crate = "regex-automata", versions = ["0.1.10", "0.4.9"], reason = "testing vs runtime dependency" },
    { crate = "regex-syntax", versions = ["0.6.29", "0.8.5"], reason = "testing vs runtime dependency" },
    { crate = "syn", versions = ["1.0.109", "2.0.100"], reason = "proc-macro ecosystem dependency" },
    { crate = "thiserror", versions = ["1.0.69", "2.0.12"], reason = "kube ecosystem dependency" },
    { crate = "windows-sys", versions = ["0.52.0", "0.59.0"], reason = "platform-specific dependency" },
    { crate = "zerocopy", versions = ["0.7.35", "0.8.23"], reason = "testing vs runtime dependency" }
]
dependency_rules = [
    "All new dependencies must be documented here",
    "Prefer workspace-level dependencies over crate-level",
    "Regularly audit and update dependencies",
    "Document reasons for multiple versions",
    "Consider alternatives for conflicting dependencies",
    "Multiple versions are allowed when required by ecosystem dependencies",
    "Document all multiple versions in known_conflicts",
    "Review multiple versions quarterly for potential resolution"
]

[workspace.dependencies]
# Runtime and Async
tokio = { version = "1.44.1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
serde_yaml = "0.9"
base64 = "0.22.1"

# Logging and Tracing
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
tracing-opentelemetry = "0.22"
opentelemetry = { version = "0.21", features = ["rt-tokio"] }

# Web Framework - Fixed feature compatibility
axum = { version = "0.7", features = ["ws", "macros"] }
warp = "0.3"
tower = { version = "0.4.13", features = ["util"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Utilities
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dashmap = "5.5"
once_cell = "1.19"
indexmap = "2.0"

# Configuration
config = "0.14"

# CLI
clap = { version = "4.4", features = ["derive"] }

# Error Handling
thiserror = "2.0.12"
anyhow = "1.0"

# Network and Storage
reqwest = { version = "0.11", features = ["json"] }
ipnetwork = "0.20"
libzfs = "0.8"
notify = "6.1"

# Security - Enhanced with proven patterns
ring = "0.17"
argon2 = "0.5"
jwt = "0.16"

# Kubernetes Integration - Enhanced capabilities
k8s-openapi = { version = "0.20.0", features = ["v1_27"] }
kube = { version = "0.87.2", features = ["runtime", "derive", "client"], default-features = false }
schemars = { version = "0.8.22", features = ["derive"] }

# Testing - Enhanced with proven patterns
tokio-test = "0.4"
criterion = "0.5"
mockall = "0.12"
proptest = "1.4"
test-case = "3.3"

# Additional Enhanced Dependencies
hashbrown = "0.15.2"
regex = { version = "1.11.1", features = ["std"] }
regex-automata = "0.4.9"
regex-syntax = "0.8.5"
syn = "2.0.100"
windows-sys = "0.59.0"
zerocopy = "0.8.23"
http = "0.2.11"

# Enhanced Linting - Advanced configuration
[workspace.lints.rust]
unsafe_code = "deny"
missing_docs = "warn"
missing_debug_implementations = "warn"
missing_copy_implementations = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"
unused_results = "warn"
variant_size_differences = "warn"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
cargo = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
multiple-crate-versions = "allow"

# Documentation lints
[workspace.lints.clippy.doc_markdown]
level = "allow"
priority = 1

# Enhanced build profiles - Advanced optimization
[profile.dev]
opt-level = 0
debug = 2
debug-assertions = true
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256
rpath = false

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = true
lto = true
panic = "unwind"
incremental = false
codegen-units = 16
rpath = false

[profile.test]
opt-level = 0
debug = 2
debug-assertions = true
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256
rpath = false

[profile.bench]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = true
lto = true
panic = "unwind"
incremental = false
codegen-units = 16
rpath = false