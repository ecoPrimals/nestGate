# NestGate v2 Workspace Configuration
# Distributed NAS system - library and workspace

[package]
name = "nestgate"
version = "0.1.0"
edition = "2021"
description = "Sovereign NAS system with ZFS integration and tiered storage"
license = "AGPL-3.0-or-later"
repository = "https://github.com/strandgeek/nestgate"
documentation = "https://docs.rs/nestgate"
keywords = ["nas", "zfs", "storage", "tier-management", "automation"]
categories = ["filesystem", "web-programming", "development-tools"]

# This is a library-only package - no binary
[lib]
name = "nestgate"
path = "src/lib.rs"

# Workspace configuration for all NestGate crates
[workspace]
members = [
    "code/crates/nestgate-core",
    "code/crates/nestgate-zfs",
    "code/crates/nestgate-bin",
    "code/crates/nestgate-automation",
    "code/crates/nestgate-api",
    "code/crates/nestgate-network",
    "code/crates/nestgate-mcp",
    "code/crates/nestgate-middleware",
    "code/crates/nestgate-ai-models",
    "code/crates/nestgate-nas",
    "code/crates/nestgate-ui",
    "code/crates/nestgate-installer",
    "code/crates/nestgate-fsmonitor",
]
exclude = [
    "target",
    "specs",
    "docs",
]
resolver = "2"

[dependencies]
# Core dependencies for NestGate library
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"

# Main binary depends on all crates
nestgate-core = { path = "code/crates/nestgate-core" }
nestgate-zfs = { path = "code/crates/nestgate-zfs" }
nestgate-automation = { path = "code/crates/nestgate-automation" }

[dev-dependencies]
tokio-test = "0.4"
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = []

[workspace.dependencies]
# Shared dependencies for workspace members
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = { version = "0.7", features = ["ws", "macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
warp = "0.3"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
clap = { version = "4.4", features = ["derive"] }
tokio-test = "0.4"
indexmap = "2.0"
reqwest = { version = "0.11", features = ["json"] }
config = "0.14"
ipnetwork = "0.20"

[workspace.lints.rust]
unused_imports = "warn"
dead_code = "warn"

[workspace.lints.clippy]
all = "warn"