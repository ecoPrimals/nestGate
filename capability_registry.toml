# NestGate Capability Registry — Machine-Readable Self-Knowledge
# SPDX-License-Identifier: AGPL-3.0-or-later
# Copyright (c) 2025-2026 ecoPrimals Collective
#
# This file is the single source of truth for NestGate's primal identity
# and advertised capabilities. Wire Standard L3 responses and cross-check
# tests derive from these definitions.
#
# Stability tiers:
#   stable      — API surface frozen; breaking changes require major version bump
#   provisional — API surface complete and tested but may evolve in minor versions
#   experimental — early implementation; may change or be removed without notice

[primal]
name = "nestgate"
domain = "storage"
version = "4.7.0-dev"
license = "AGPL-3.0-or-later"
description = "Sovereign storage & permanence primal — filesystem-backed durable key-value, blob, and ZFS orchestration"
transport = ["uds", "tcp", "http"]
protocol = "jsonrpc-2.0"

[capabilities.storage]
domain = "storage"
stability = "stable"
description = "Filesystem-backed durable key-value and blob storage with namespace isolation"
methods = [
    "storage.store", "storage.retrieve", "storage.exists",
    "storage.delete", "storage.list", "storage.stats",
    "storage.store_blob", "storage.retrieve_blob", "storage.retrieve_range",
    "storage.object.size", "storage.namespaces.list",
    "storage.fetch_external",
    "storage.list_blobs", "storage.blob_exists",
    "storage.store_stream", "storage.store_stream_chunk",
    "storage.retrieve_stream", "storage.retrieve_stream_chunk",
]

# ── Parameter naming notes (NG-3) ──────────────────────────────────
# storage.store_blob uses `blob` (not `data`) for the base64 payload.
# storage.fetch_external uses `cache_key` (not `key`) for the storage key.
# All other storage methods use `key` for the object identifier and
# `data` for the base64 payload. These asymmetries are preserved for
# backward compatibility.

# ── Streaming wire protocol (NG-4) ─────────────────────────────────
#
# ## Store stream (upload):
# 1. storage.store_stream
#    params:  {key, dataset?, family_id?, total_size?, content_type?}
#    returns: {stream_id, chunk_size}
# 2. storage.store_stream_chunk (loop until is_last)
#    params:  {stream_id, offset, data: "<base64>", is_last: bool}
#    returns: {stream_id, offset, bytes_written}
#    Final chunk (is_last: true) returns: {stream_id, total_size, stored: true}
#
# ## Retrieve stream (download):
# 3. storage.retrieve_stream
#    params:  {key, dataset?, family_id?}
#    returns: {stream_id, total_size, chunk_size}
# 4. storage.retrieve_stream_chunk (loop until is_last)
#    params:  {stream_id, offset}
#    returns: {data: "<base64>", offset, length, total_size, is_last: bool}
#
# ## Constraints:
# - Max chunk size: 4 MiB decoded (larger base64 in JSON wire format).
# - Sessions expire after 1 hour of inactivity.
# - stream_id is a UUID v4 scoped to the NestGate process lifetime.
# - offset must be monotonically increasing per session.
# - data is standard base64 (RFC 4648) with padding.

# ── Common parameter: family_id ────────────────────────────────────
# Optional when connecting via a family-scoped socket (nestgate-{family}.sock).
# The server defaults to its own NESTGATE_FAMILY_ID / FAMILY_ID from the
# environment. Explicit family_id in params always takes precedence.
# Required only in standalone mode with no env var set.

[capabilities.content]
domain = "content"
stability = "stable"
description = "Content-addressed storage with versioned manifests — BLAKE3 hash-as-key, automatic dedup, atomic deploys"
methods = [
    "content.put", "content.get", "content.exists", "content.list",
    "content.publish", "content.resolve", "content.promote", "content.collections",
]

# ── Content-addressed storage protocol (NG-1) ──────────────────────
# content.put:    {data|content_base64: "<base64>", content_type?, source?, pipeline?, stored_by?, metadata?, family_id?} → {hash, size, stored, deduplicated}
#   Accepts "content_base64" as alias for "data" (SP-4 compat).
#   Provenance fields accepted at top level or nested in "metadata" object.
# content.get:    {hash: "<blake3_hex>", family_id?} → {data: "<base64>", hash, size, content_type?, retrieved_in_ms}
# content.exists: {hash: "<blake3_hex>", family_id?} → {exists, hash, size?}
# content.list:   {family_id?} → {hashes: [{hash, size}], count}
# hash is the 64-char lowercase hex BLAKE3 digest of the raw (pre-base64) bytes.
# Filesystem: {base}/datasets/{family}/_content/{hex[..2]}/{hex}
#
# ── Content manifests (NG-2) ────────────────────────────────────────
# content.publish:     {collection, manifest: {path: hash, ...}, family_id?} → {collection, entry_count, stored}
# content.resolve:     {collection, path, inline?, family_id?} → {hash, path, collection, resolved_path?, resolved_in_ms, data?, content_type?}
#   Path normalization: if exact path not found, tries {path}index.html (trailing /) or {path}/index.html (bare path).
#   resolved_path is set only when a fallback was used.
# content.promote:     {collection, alias, family_id?} → {alias, target, promoted}
# content.collections: {prefix?, family_id?} → {collections: [name, ...], count}
# Manifests live at {base}/datasets/{family}/_manifests/{collection}.json
# Aliases are thin JSON files with {"alias": true, "target": "<collection>"}

[capabilities.model]
domain = "model"
stability = "provisional"
description = "AI model cache — registration, lookup, metadata"
methods = ["model.register", "model.exists", "model.locate", "model.metadata"]

[capabilities.templates]
domain = "templates"
stability = "provisional"
description = "Template persistence and community ranking"
methods = ["templates.store", "templates.retrieve", "templates.list", "templates.community_top"]

[capabilities.session]
domain = "session"
stability = "stable"
description = "Game session persistence (convenience over storage.*)"
methods = ["session.save", "session.load"]

[capabilities.audit]
domain = "audit"
stability = "provisional"
description = "Execution audit trail persistence"
methods = ["audit.store_execution"]

[capabilities.nat]
domain = "nat"
stability = "stable"
description = "NAT traversal endpoint persistence"
methods = ["nat.store_traversal_info", "nat.retrieve_traversal_info"]

[capabilities.beacon]
domain = "beacon"
stability = "stable"
description = "Known beacon persistence for mesh discovery"
methods = ["beacon.store", "beacon.retrieve", "beacon.list", "beacon.delete"]

# data.* — Wildcard delegation only. NestGate does not implement data operations;
# it directs callers to discover a data capability provider. Not counted as methods.

[capabilities.bonding]
domain = "bonding"
stability = "stable"
description = "Ionic bond ledger persistence for security capability provider"
methods = ["bonding.ledger.store", "bonding.ledger.retrieve", "bonding.ledger.list"]

[capabilities.zfs]
domain = "zfs"
stability = "provisional"
description = "ZFS storage management — pools, datasets, snapshots"
methods = [
    "zfs.pool.list", "zfs.pool.get", "zfs.pool.health",
    "zfs.dataset.list", "zfs.dataset.get",
    "zfs.snapshot.list", "zfs.health",
]

[capabilities.health]
domain = "health"
stability = "stable"
description = "Liveness, readiness, and health check endpoints"
methods = ["health.liveness", "health.readiness", "health.check"]

[capabilities.identity]
domain = "identity"
stability = "stable"
description = "Primal identity and self-knowledge"
methods = ["identity.get"]

[capabilities.discovery]
domain = "discovery"
stability = "stable"
description = "Capability advertisement and listing"
methods = ["capabilities.list", "discover.capabilities"]

[capabilities.lifecycle]
domain = "lifecycle"
stability = "stable"
description = "Primal lifecycle status probe (public, no auth required)"
methods = ["lifecycle.status"]

[capabilities.auth]
domain = "auth"
stability = "stable"
description = "Method gate introspection — enforcement mode, caller identity, authorization check (JH-0)"
methods = ["auth.check", "auth.mode", "auth.peer_info"]

[capabilities.btsp]
domain = "btsp"
stability = "stable"
description = "BTSP security capabilities — protocol version, cipher suite, handshake requirement"
methods = ["btsp.capabilities"]

# Consumed capabilities — what NestGate needs from other primals
[consumed_capabilities.security]
reason = "BTSP handshake crypto delegation"
required = false

[consumed_capabilities.discovery_mesh]
reason = "Service mesh registration and heartbeat"
required = false

[consumed_capabilities.crypto]
reason = "Content-addressed hashing, signature verification (delegated via IPC)"
required = false
