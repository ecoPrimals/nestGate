# NestGate Capability Registry — Machine-Readable Self-Knowledge
# SPDX-License-Identifier: AGPL-3.0-or-later
# Copyright (c) 2025-2026 ecoPrimals Collective
#
# Canonical location for ecosystem tooling (Wave 78 convention).
# A backward-compat copy lives at the repo root.
#
# This file is the single source of truth for NestGate's primal identity
# and advertised capabilities. Wire Standard L3 responses and cross-check
# tests derive from these definitions.
#
# Stability tiers:
#   stable      — API surface frozen; breaking changes require major version bump
#   provisional — API surface complete and tested but may evolve in minor versions
#   experimental — early implementation; may change or be removed without notice

[primal]
name = "nestgate"
domain = "storage"
version = "0.5.0"
license = "AGPL-3.0-or-later"
description = "Sovereign storage & permanence primal — filesystem-backed durable key-value, blob, and ZFS orchestration"
transport = ["uds", "tcp", "http"]
transport_evolution = "phase2"  # Phase 1: accepts TRANSPORT_ENDPOINT (Wave 100). Phase 2: all outbound IPC via connect_transport() (Wave 101)
protocol = "jsonrpc-2.0"

[capabilities.storage]
domain = "storage"
stability = "stable"
description = "Filesystem-backed durable key-value and blob storage with namespace isolation"
methods = [
    "storage.store", "storage.retrieve", "storage.exists",
    "storage.delete", "storage.list", "storage.stats",
    "storage.store_blob", "storage.retrieve_blob", "storage.retrieve_range",
    "storage.object.size", "storage.namespaces.list",
    "storage.fetch_external",
    "storage.list_blobs", "storage.blob_exists",
    "storage.store_stream", "storage.store_stream_chunk",
    "storage.retrieve_stream", "storage.retrieve_stream_chunk",
]

# ── Parameter naming notes (NG-3) ──────────────────────────────────
# storage.store_blob uses `blob` (not `data`) for the base64 payload.
# storage.fetch_external uses `cache_key` (not `key`) for the storage key.
# All other storage methods use `key` for the object identifier and
# `data` for the base64 payload. These asymmetries are preserved for
# backward compatibility.

# ── Streaming wire protocol (NG-4) ─────────────────────────────────
#
# ## Store stream (upload):
# 1. storage.store_stream
#    params:  {key, dataset?, family_id?, total_size?, content_type?}
#    returns: {stream_id, chunk_size}
# 2. storage.store_stream_chunk (loop until is_last)
#    params:  {stream_id, offset, data: "<base64>", is_last: bool}
#    returns: {stream_id, offset, bytes_written}
#    Final chunk (is_last: true) returns: {stream_id, total_size, stored: true}
#
# ## Retrieve stream (download):
# 3. storage.retrieve_stream
#    params:  {key, dataset?, family_id?}
#    returns: {stream_id, total_size, chunk_size}
# 4. storage.retrieve_stream_chunk (loop until is_last)
#    params:  {stream_id, offset}
#    returns: {data: "<base64>", offset, length, total_size, is_last: bool}
#
# ## Constraints:
# - Max chunk size: 4 MiB decoded (larger base64 in JSON wire format).
# - Sessions expire after 1 hour of inactivity.
# - stream_id is a UUID v4 scoped to the NestGate process lifetime.
# - offset must be monotonically increasing per session.
# - data is standard base64 (RFC 4648) with padding.

# ── Common parameter: family_id ────────────────────────────────────
# Optional when connecting via a family-scoped socket (nestgate-{family}.sock).
# The server defaults to its own NESTGATE_FAMILY_ID / FAMILY_ID from the
# environment. Explicit family_id in params always takes precedence.
# Required only in standalone mode with no env var set.

[capabilities.content]
domain = "content"
stability = "stable"
description = "Content-addressed storage with versioned manifests — BLAKE3 hash-as-key, automatic dedup, atomic deploys"
methods = [
    "content.put", "content.get", "content.exists", "content.list",
    "content.publish", "content.resolve", "content.promote", "content.collections",
    "content.fetch_heads", "content.push", "content.replicate", "content.replicate.pull", "content.sync",
    "content.store_stream", "content.store_stream_chunk",
    "content.retrieve_stream", "content.retrieve_stream_chunk",
]

# ── Content-addressed storage protocol (NG-1) ──────────────────────
# content.put:    {data|content_base64: "<base64>", content_type?, source?, pipeline?, stored_by?, metadata?, family_id?} → {hash, size, stored, deduplicated}
#   Accepts "content_base64" as alias for "data" (SP-4 compat).
#   Provenance fields accepted at top level or nested in "metadata" object.
# content.get:    {hash: "<blake3_hex>", family_id?} → {data: "<base64>", hash, size, content_type?, retrieved_in_ms}
# content.exists: {hash: "<blake3_hex>", family_id?} → {exists, hash, size?}
# content.list:   {family_id?} → {hashes: [{hash, size}], count}
# hash is the 64-char lowercase hex BLAKE3 digest of the raw (pre-base64) bytes.
# Filesystem: {base}/datasets/{family}/_content/{hex[..2]}/{hex}
#
# ── Content manifests (NG-2) ────────────────────────────────────────
# content.publish:     {collection, manifest: {path: hash, ...}, family_id?} → {collection, entry_count, stored}
# content.resolve:     {collection, path, inline?, family_id?} → {hash, path, collection, resolved_path?, resolved_in_ms, data?, content_type?}
#   Path normalization: if exact path not found, tries {path}index.html (trailing /) or {path}/index.html (bare path).
#   resolved_path is set only when a fallback was used.
# content.promote:     {collection, alias, family_id?} → {alias, target, promoted}
# content.collections: {prefix?, family_id?} → {collections: [name, ...], count}
# Manifests live at {base}/datasets/{family}/_manifests/{collection}.json
# Aliases are thin JSON files with {"alias": true, "target": "<collection>"}
#
# ── Content federation (Wave 60 — waterFall / rootPulse) ─────────────
# content.fetch_heads: {repos: [{path, remote?, branch?}]} → {heads: [{path, local_head, remote_head, drift, behind, ahead}], checked_at}
#   Read-only freshness check — git ls-remote without pulling. Serves ecosystem.check.
# content.push:        {repos: [{path, remote?, branch?}]} → {results: [{path, pushed, already_up_to_date?, error?}], pushed_count}
#   Push to Forgejo (periplasm) or other remote. Serves ecosystem.push.
# content.replicate:      {cids: ["<blake3_hex>"], target: "<socket_or_tcp>", family_id?} → {replicated: [{cid, transferred, size?}], total_bytes}
#   Push-direction cross-gate blob transfer. Diff-based. Serves rootpulse.federate.
# content.replicate.pull: {cids: ["<blake3_hex>"], source: "<socket_or_tcp>", family_id?} → {pulled: [{cid, pulled, size?}], total_bytes}
#   Pull-direction cross-gate blob transfer. Cold-from-hot federation (Wave 73). Diff-based: skips blobs already present locally.
# content.sync:                  {repos: [{path, remote?, branch?, clone_url?}], parallel?, source?, clone_missing?} → {results: [{path, synced, action, commits_pulled?}], synced_count}
#   Cascade-pull from remote sources (Neural API equivalent of cascade-pull.sh). Serves ecosystem.pull.
#
# ── Content streaming (Wave 74 — chunked CAS for large blobs) ─────────
# content.store_stream:          {total_size, family_id?, content_type?} → {stream_id, chunk_size}
#   Begin a chunked CAS upload. Key is computed (BLAKE3) on finalize, not caller-supplied.
# content.store_stream_chunk:    {stream_id, offset, data: "<base64>", is_last} → {stream_id, hash?, size?, stored?, deduplicated?}
#   Append chunk. On is_last=true: computes BLAKE3, renames staging → CAS path, returns hash.
# content.retrieve_stream:       {hash, family_id?, chunk_size?} → {stream_id, total_size, chunk_size, hash}
#   Begin chunked CAS download by BLAKE3 hash.
# content.retrieve_stream_chunk: {stream_id, offset} → {data, offset, length, total_size, is_last}
#   Read next chunk. Reuses storage.retrieve_stream_chunk session infrastructure.
#
# ── Direct HTTP content serving (Session 93) ──────────────────────
# GET /content/:hash?family_id=<optional>
#   Returns raw bytes (not JSON, not base64) with Content-Type from .meta.json sidecar.
#   Cache-Control: public, max-age=31536000, immutable (BLAKE3 hashes are permanent).
#   ETag: "<blake3_hash>". 404 for missing, 400 for malformed hash.
#   Designed for Caddy reverse proxy: nestgate.io/<hash> → NestGate /content/<hash>.

[capabilities.repo]
domain = "content"
stability = "provisional"
description = "Sovereign Forgejo repository management — create, list, delete repos on the inner membrane forge"
methods = ["content.repo.create", "content.repo.list", "content.repo.delete"]

# ── Repo management protocol (shadow — Wave 61) ─────────────────
# content.repo.create: {org, name} → {name, full_name, mirror, default_branch}
#   Creates a new repository on the Forgejo inner membrane forge.
# content.repo.list:   {org?} → {repos: [{name, full_name, mirror, description}], count}
#   Lists all repos in a Forgejo org. Default org: ecoPrimals.
# content.repo.delete: {full_name} → {deleted: true}
#   Deletes a repository from Forgejo. Irreversible.
#
# Shadow implementation: membrane-shadow crate (cellMembrane).
# These methods proxy to the Forgejo API via HTTPS and will
# eventually be implemented natively when nestGate gains direct
# Forgejo integration.

[capabilities.mirror]
domain = "content"
stability = "provisional"
description = "Forgejo pull mirror management — trigger sync, check status of GitHub→Forgejo mirrors"
methods = ["content.mirror.sync", "content.mirror.status"]

# ── Mirror protocol (shadow — Wave 61) ──────────────────────────
# content.mirror.sync:   {full_name} → {repo, triggered, http_code}
#   Triggers immediate pull-mirror sync from GitHub on a single repo.
# content.mirror.status: {full_name} → {name, full_name, mirror, mirror_interval, mirror_updated}
#   Returns mirror configuration and last sync timestamp.
#
# Shadow implementation: membrane-shadow crate (cellMembrane).

[capabilities.model]
domain = "model"
stability = "provisional"
description = "AI model cache — registration, lookup, metadata"
methods = ["model.register", "model.exists", "model.locate", "model.metadata"]

[capabilities.templates]
domain = "templates"
stability = "provisional"
description = "Template persistence and community ranking"
methods = ["templates.store", "templates.retrieve", "templates.list", "templates.community_top"]

[capabilities.session]
domain = "session"
stability = "stable"
description = "Game session persistence (convenience over storage.*)"
methods = ["session.save", "session.load"]

[capabilities.audit]
domain = "audit"
stability = "provisional"
description = "Execution audit trail persistence"
methods = ["audit.store_execution"]

[capabilities.nat]
domain = "nat"
stability = "stable"
description = "NAT traversal endpoint persistence"
methods = ["nat.store_traversal_info", "nat.retrieve_traversal_info"]

[capabilities.beacon]
domain = "beacon"
stability = "stable"
description = "Known beacon persistence for mesh discovery"
methods = ["beacon.store", "beacon.retrieve", "beacon.list", "beacon.delete"]

# data.* — Wildcard delegation only. NestGate does not implement data operations;
# it directs callers to discover a data capability provider. Not counted as methods.

[capabilities.bonding]
domain = "bonding"
stability = "stable"
description = "Ionic bond ledger persistence for security capability provider"
methods = ["bonding.ledger.store", "bonding.ledger.retrieve", "bonding.ledger.list"]

[capabilities.zfs]
domain = "zfs"
stability = "provisional"
description = "ZFS storage management — pools, datasets, snapshots"
methods = [
    "zfs.pool.list", "zfs.pool.get", "zfs.pool.health",
    "zfs.dataset.list", "zfs.dataset.get",
    "zfs.snapshot.list", "zfs.snapshot.create", "zfs.snapshot.destroy",
    "zfs.health",
]

# zfs.snapshot.create: {dataset: "<pool/dataset>", name?: "<snapshot_name>"} → {snapshot, dataset, name}
#   Creates a ZFS snapshot. Name defaults to "nestgate-{unix_timestamp}" if omitted.
#   Used for point-in-time CAS dataset recovery and federation state checkpoints.
# zfs.snapshot.destroy: {snapshot: "<pool/dataset@name>"} → {destroyed: "<full_name>"}
#   Destroys a ZFS snapshot. The snapshot param must contain '@'.

[capabilities.coordination]
domain = "coordination"
stability = "provisional"
description = "Ecosystem coordination — blurbs, FRAGOs, wave state, gate heads, depot, provenance (rootPulse-traced CAS)"
methods = [
    "coord.blurbs.current", "coord.blurbs.list", "coord.blurbs.get",
    "coord.fragos.list", "coord.fragos.get",
    "coord.waves.current", "coord.waves.history",
    "coord.heads.get", "coord.heads.all",
    "coord.topology", "coord.depot.status", "coord.provenance", "coord.ingest",
]

# ── Coordination protocol (Wave 135) ────────────────────────────
# coord.blurbs.current:  {} → {wave, date, content, hash, ingested_at}
#   Returns the latest (highest wave number) ingested blurb.
# coord.blurbs.list:     {} → {blurbs: [{wave, date, hash, ingested_at}], count}
#   Lists all ingested blurbs, newest first.
# coord.blurbs.get:      {hash|wave} → {wave, date, content, hash, ingested_at}
#   Retrieve a specific blurb by BLAKE3 hash or wave number.
# coord.fragos.list:     {} → {fragos: [{name, hash, ingested_at}], count}
#   Lists all FRAGOs and AARs.
# coord.fragos.get:      {hash} → {name, content, hash, ingested_at}
#   Retrieve a specific FRAGO/AAR by hash.
# coord.waves.current:   {} → {wave, date, posture, ...}
#   Current wave state from coordination manifest.
# coord.waves.history:   {} → {waves: [{wave, date}], count}
#   Wave history from the coordination manifest.
# coord.heads.get:       {gate} → {gate, commit, status, ...}
#   Return a specific gate's HEAD state.
# coord.heads.all:       {} → {heads: [{gate, commit, status}], count}
#   Return all gate HEAD states.
# coord.topology:        {} → {gates: [...], connections: [...]}
#   Mesh topology derived from gate heads.
# coord.depot.status:    {} → {path, exists, staleness, binaries}
#   Depot staleness and binary info.
# coord.provenance:      {hash} → {trail: [{source, ingested_at, ...}]}
#   Provenance trail for a content-addressed artifact.
# coord.ingest:          {artifacts: [{filename, content_base64}]} → {ingested: [{hash, filename}], count}
#   Ingest wateringHole artifacts into the coordination CAS.
#   Write-path: UDS-only by default (protected method gate).

[capabilities.health]
domain = "health"
stability = "stable"
description = "Liveness, readiness, and health check endpoints"
methods = ["health.liveness", "health.readiness", "health.check"]

[capabilities.identity]
domain = "identity"
stability = "stable"
description = "Primal identity and self-knowledge"
methods = ["identity.get"]

[capabilities.discovery]
domain = "discovery"
stability = "stable"
description = "Capability advertisement, listing, and mesh route registration"
methods = ["capabilities.list", "discover.capabilities", "discovery.capability.register", "route.register"]

# route.register:              {gate_id?, ttl_seconds?} → {registered, gate_id, capabilities, federation_methods, endpoints, storage_backend, ttl_seconds}
#   Mesh capability registration (Wave 73). Registers NestGate's storage and content capabilities
#   with the local route manifest for cross-gate discovery. Includes gate identity, federation
#   endpoints (UDS/TCP), storage backend type (filesystem/zfs), and federation method list.

[capabilities.lifecycle]
domain = "lifecycle"
stability = "stable"
description = "Primal lifecycle status probe (public, no auth required)"
methods = ["lifecycle.status"]

[capabilities.auth]
domain = "auth"
stability = "stable"
description = "Method gate introspection — enforcement mode, caller identity, authorization check (JH-0)"
methods = ["auth.check", "auth.mode", "auth.peer_info"]

[capabilities.btsp]
domain = "btsp"
stability = "stable"
description = "BTSP security capabilities — protocol version, cipher suite, handshake requirement"
methods = ["btsp.capabilities"]

# Neural API announce — self-registration with biomeOS (Wave 43, extended Wave 73)
[announce]
method = "primal.announce"
target = "biomeos"
signal_tiers = ["nest"]
capabilities = ["storage", "content", "coordination"]
federation_methods = ["content.replicate", "content.replicate.pull", "content.fetch_heads", "content.push", "content.sync"]
cost_hints = { storage = 10.0, content = 15.0 }
latency_estimates = { storage = 50, content = 20 }
wire_schema = "WAVE42_NEURAL_API_DEPLOYMENT_GUIDE.md"
trigger = "post-bind"
# Wave 73 extensions: gate_id, endpoints (uds/tcp), storage_backend (filesystem/zfs), federation_methods
# gate_id resolved from NESTGATE_GATE_ID → NESTGATE_FAMILY_ID → "standalone"
# storage_backend.type = "zfs" when NESTGATE_ZFS_CAS_DATASET is set

# Consumed capabilities — what NestGate needs from other primals
[consumed_capabilities.security]
reason = "BTSP handshake crypto delegation"
required = false

[consumed_capabilities.discovery_mesh]
reason = "Service mesh registration and heartbeat"
required = false

[consumed_capabilities.crypto]
reason = "Content-addressed hashing, signature verification (delegated via IPC)"
required = false
