# This file is the single source of truth for NestGate's primal identity
# and advertised capabilities. Wire Standard L3 responses and cross-check
# tests derive from these definitions.

[primal]
name = "nestgate"
domain = "storage"
version = "4.7.0-dev"
license = "AGPL-3.0-or-later"
description = "Sovereign storage & permanence primal — filesystem-backed durable key-value, blob, and ZFS orchestration"
transport = ["uds", "http"]
protocol = "jsonrpc-2.0"

[capabilities.storage]
domain = "storage"
description = "Filesystem-backed durable key-value and blob storage with namespace isolation"
methods = [
    "storage.store", "storage.retrieve", "storage.exists",
    "storage.delete", "storage.list", "storage.stats",
    "storage.store_blob", "storage.retrieve_blob", "storage.retrieve_range",
    "storage.object.size", "storage.namespaces.list",
    "storage.fetch_external",
    "storage.store_stream", "storage.store_stream_chunk",
    "storage.retrieve_stream", "storage.retrieve_stream_chunk",
]

# Streaming protocol (storage.store_stream / storage.retrieve_stream):
# 1. Call storage.store_stream with {key, family_id?, dataset?} → {stream_id, chunk_size}
# 2. Loop: storage.store_stream_chunk with {stream_id, data: "<base64>", is_last: bool}
# 3. Call storage.retrieve_stream with {key, family_id?, dataset?} → {stream_id, total_size, chunk_size}
# 4. Loop: storage.retrieve_stream_chunk with {stream_id, offset} → {data: "<base64>", is_last}
# Max chunk: 4 MiB decoded (base64 encoded in JSON). Sessions expire after 1 hour.

# Common parameter: family_id
# Optional when connecting via a family-scoped socket (nestgate-{family}.sock).
# The server defaults to its own NESTGATE_FAMILY_ID / FAMILY_ID from the
# environment. Explicit family_id in params always takes precedence.
# Required only in standalone mode with no env var set.

[capabilities.model]
domain = "model"
description = "AI model cache — registration, lookup, metadata"
methods = ["model.register", "model.exists", "model.locate", "model.metadata"]

[capabilities.templates]
domain = "templates"
description = "Template persistence and community ranking"
methods = ["templates.store", "templates.retrieve", "templates.list", "templates.community_top"]

[capabilities.session]
domain = "session"
description = "Game session persistence (convenience over storage.*)"
methods = ["session.save", "session.load"]

[capabilities.audit]
domain = "audit"
description = "Execution audit trail persistence"
methods = ["audit.store_execution"]

[capabilities.nat]
domain = "nat"
description = "NAT traversal endpoint persistence"
methods = ["nat.store_traversal_info", "nat.retrieve_traversal_info"]

[capabilities.beacon]
domain = "beacon"
description = "Known beacon persistence for mesh discovery"
methods = ["beacon.store", "beacon.retrieve", "beacon.list", "beacon.delete"]

# data.* — Wildcard delegation only. NestGate does not implement data operations;
# it directs callers to discover a data capability provider. Not counted as methods.

[capabilities.bonding]
domain = "bonding"
description = "Ionic bond ledger persistence for security capability provider"
methods = ["bonding.ledger.store", "bonding.ledger.retrieve", "bonding.ledger.list"]

[capabilities.zfs]
domain = "zfs"
description = "ZFS storage management — pools, datasets, snapshots"
methods = [
    "zfs.pool.list", "zfs.pool.get", "zfs.pool.health",
    "zfs.dataset.list", "zfs.dataset.get",
    "zfs.snapshot.list", "zfs.health",
]

[capabilities.health]
domain = "health"
description = "Liveness, readiness, and health check endpoints"
methods = ["health.liveness", "health.readiness", "health.check"]

[capabilities.identity]
domain = "identity"
description = "Primal identity and self-knowledge"
methods = ["identity.get"]

[capabilities.discovery]
domain = "discovery"
description = "Capability advertisement and listing"
methods = ["capabilities.list", "discover.capabilities"]

# Consumed capabilities — what NestGate needs from other primals
[consumed_capabilities.security]
reason = "BTSP handshake crypto delegation"
required = false

[consumed_capabilities.discovery_mesh]
reason = "Service mesh registration and heartbeat"
required = false

[consumed_capabilities.crypto]
reason = "Content-addressed hashing, signature verification (delegated via IPC)"
required = false
