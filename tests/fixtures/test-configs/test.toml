# Test configuration for NestGate ZFS testing
[zfs]
use_real_zfs = true
default_pool = "nestpool"
test_timeout_seconds = 30

[health_monitoring]
enabled = true
check_interval_seconds = 1

[metrics]
enabled = true
collection_interval_seconds = 1

[migration]
background_migration = false
max_concurrent_jobs = 1
max_bandwidth_mbps = 100

[performance]
collection_interval = 1
analysis_interval = 5
alert_interval = 10
